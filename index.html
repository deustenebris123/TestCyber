<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0b0c0e;
      --surface:   #111318;
      --border:    #22262f;
      --accent:    #c8a96e;
      --accent2:   #e8d5a8;
      --text:      #e8e4db;
      --muted:     #6b6f78;
      --error:     #d4614a;
      --input-bg:  #16191f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background blobs */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(200,169,110,0.07) 0%, transparent 70%);
      top: -150px; right: -150px;
      border-radius: 50%;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(ellipse, rgba(100,120,180,0.06) 0%, transparent 70%);
      bottom: -150px; left: -100px;
      border-radius: 50%;
      pointer-events: none;
      animation: drift 15s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.06); }
    }

    /* Grid texture overlay */
    .grid-overlay {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 0 24px;
      animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 40px 44px;
      box-shadow:
        0 0 0 1px rgba(200,169,110,0.06),
        0 32px 80px rgba(0,0,0,0.55);
      position: relative;
      overflow: hidden;
    }

    /* Top gold line accent */
    .card-inner::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    /* Logo / brand */
    .brand {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeUp 0.8s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px; height: 48px;
      border: 1px solid var(--accent);
      border-radius: 4px;
      margin-bottom: 16px;
      position: relative;
    }
    .brand-icon::after {
      content: '◆';
      font-size: 18px;
      color: var(--accent);
      line-height: 1;
    }

    .brand h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .brand p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Form fields */
    .field {
      margin-bottom: 20px;
      animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }
    .field:nth-child(1) { animation-delay: 0.18s; }
    .field:nth-child(2) { animation-delay: 0.24s; }
    .field:nth-child(3) { animation-delay: 0.30s; }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.1);
    }

    input::placeholder { color: #3a3e48; }

    /* Password toggle */
    .toggle-pw {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 4px;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--accent); }

    /* Options row */
    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      animation: fadeUp 0.8s 0.32s cubic-bezier(0.22,1,0.36,1) both;
    }

    .remember {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      user-select: none;
    }

    .remember input[type="checkbox"] {
      appearance: none;
      width: 14px; height: 14px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--input-bg);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    .remember input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .remember input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 4px; height: 7px;
      border-right: 1.5px solid #0b0c0e;
      border-bottom: 1.5px solid #0b0c0e;
      transform: rotate(45deg);
    }

    .forgot {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--accent); }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #0b0c0e;
      border: none;
      border-radius: 3px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.25s, transform 0.15s;
      animation: fadeUp 0.8s 0.38s cubic-bezier(0.22,1,0.36,1) both;
    }

    .btn-login::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }
    .btn-login:hover { background: var(--accent2); }
    .btn-login:hover::after { background: rgba(255,255,255,0.06); }
    .btn-login:active { transform: scale(0.985); }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
      animation: fadeUp 0.8s 0.42s cubic-bezier(0.22,1,0.36,1) both;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider span {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Social / alternative login */
    .social-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      animation: fadeUp 0.8s 0.46s cubic-bezier(0.22,1,0.36,1) both;
    }

    .btn-social {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-social:hover {
      border-color: rgba(200,169,110,0.4);
      color: var(--accent2);
      background: rgba(200,169,110,0.04);
    }
    .btn-social svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      animation: fadeUp 0.8s 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: var(--accent2); }

    /* Error message */
    .error-msg {
      display: none;
      background: rgba(212,97,74,0.1);
      border: 1px solid rgba(212,97,74,0.3);
      border-radius: 3px;
      padding: 10px 14px;
      font-size: 11px;
      color: var(--error);
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }
    .error-msg.show { display: block; }

    /* Success state */
    .success-overlay {
      display: none;
      position: absolute; inset: 0;
      background: var(--surface);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 10;
    }
    .success-overlay.show { display: flex; }
    .success-icon {
      font-size: 36px;
      animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes pop {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }
    .success-overlay p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.1em;
    }
    .success-overlay small {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<div class="grid-overlay"></div>

<div class="card">
  <div class="card-inner">

    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-icon">✦</div>
      <p>Bienvenido de vuelta</p>
      <small>Redirigiendo...</small>
    </div>

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon"></div>
      <h1>Arcanum</h1>
      <p>Portal de acceso seguro</p>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="errorMsg">
      Credenciales incorrectas. Por favor intenta de nuevo.
    </div>

    <!-- Form -->
    <div class="field">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="usuario@ejemplo.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePw" type="button">ver</button>
      </div>
    </div>

    <div class="options">
      <label class="remember">
        <input type="checkbox" id="remember"/>
        Recordarme
      </label>
      <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn-login" id="loginBtn">Iniciar sesión</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span>o continúa con</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-grid">
      <button class="btn-social">
        <!-- Google icon -->
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="btn-social">
        <!-- GitHub icon -->
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.014-1.703-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/>
        </svg>
        GitHub
      </button>
    </div>

    <div class="footer">
      ¿No tienes cuenta? <a href="#">Regístrate</a>
    </div>

  </div>
</div>

<script>
  // Toggle password visibility
  const togglePw = document.getElementById('togglePw');
  const pwInput  = document.getElementById('password');
  togglePw.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    togglePw.textContent = isHidden ? 'ocultar' : 'ver';
  });

  // Login logic (demo)
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  const successOverlay = document.getElementById('successOverlay');

  loginBtn.addEventListener('click', () => {
    const email = document.getElementById('email').value.trim();
    const password = pwInput.value;

    errorMsg.classList.remove('show');

    if (!email || !password) {
      errorMsg.textContent = 'Por favor completa todos los campos.';
      errorMsg.classList.add('show');
      return;
    }

    // Demo: accept any valid-looking email + password with 6+ chars
    const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    if (!emailValid || password.length < 6) {
      errorMsg.textContent = 'Credenciales incorrectas. Por favor intenta de nuevo.';
      errorMsg.classList.add('show');
      return;
    }

    // Success
    loginBtn.textContent = 'Verificando...';
    loginBtn.disabled = true;
    setTimeout(() => {
      successOverlay.classList.add('show');
    }, 800);
  });

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') loginBtn.click();
  });
</script>

</body>
</html>
